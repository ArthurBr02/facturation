services:
  db:
    image: postgres:16-alpine
    container_name: facturation-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-facturation}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-facturation}
      POSTGRES_DB: ${POSTGRES_DB:-facturation}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-facturation} -d ${POSTGRES_DB:-facturation}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: facturation-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-facturation}:${POSTGRES_PASSWORD:-facturation}@db:5432/${POSTGRES_DB:-facturation}?schema=public
      NODE_ENV: ${NODE_ENV:-production}
      GOOGLE_APPLICATION_CREDENTIALS_SOURCE: /app/cle.json
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      # Persist temporary PDFs and DB backups on the host disk.
      - ./apifiles:/app/storage
      # Local service-account key copied into the storage volume at startup.
      - ./cle.json:/app/cle.json:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: facturation-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "${WEB_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:80/"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
